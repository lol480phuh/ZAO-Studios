<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATS CRADLE // NEON THREAD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: #0ff;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* Hidden real video feed */
  #webcam {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* Main canvas - behind everything */
  #main-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Scanline overlay */
  #scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Vignette */
  #vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,20,0.85) 100%);
    pointer-events: none;
    z-index: 11;
  }

  /* HUD UI */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 20;
    pointer-events: none;
  }

  .hud-title {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: rgba(0,255,255,0.6);
    text-transform: uppercase;
    line-height: 1.6;
  }
  .hud-title strong {
    display: block;
    font-size: 18px;
    color: #0ff;
    letter-spacing: 0.2em;
    text-shadow: 0 0 12px #0ff, 0 0 30px rgba(0,255,255,0.4);
  }

  .hud-right {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(0,255,255,0.4);
    line-height: 2;
  }

  #status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #f0f;
    box-shadow: 0 0 8px #f0f;
    margin-right: 6px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #corner-tl, #corner-tr, #corner-bl, #corner-br {
    position: absolute;
    width: 24px; height: 24px;
    z-index: 20;
    pointer-events: none;
  }
  #corner-tl { top: 8px; left: 8px; border-top: 1px solid rgba(0,255,255,0.4); border-left: 1px solid rgba(0,255,255,0.4); }
  #corner-tr { top: 8px; right: 8px; border-top: 1px solid rgba(0,255,255,0.4); border-right: 1px solid rgba(0,255,255,0.4); }
  #corner-bl { bottom: 8px; left: 8px; border-bottom: 1px solid rgba(0,255,255,0.4); border-left: 1px solid rgba(0,255,255,0.4); }
  #corner-br { bottom: 8px; right: 8px; border-bottom: 1px solid rgba(0,255,255,0.4); border-right: 1px solid rgba(0,255,255,0.4); }

  #loading-screen {
    position: absolute;
    inset: 0;
    background: #000814;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 24px;
    transition: opacity 0.8s ease;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }

  .loading-title {
    font-size: 32px;
    letter-spacing: 0.4em;
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 60px rgba(0,255,255,0.3);
  }
  .loading-sub {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: rgba(0,255,255,0.5);
  }
  .loading-bar-wrap {
    width: 260px;
    height: 2px;
    background: rgba(0,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #0ff, #f0f);
    box-shadow: 0 0 10px #0ff;
    animation: load 2.5s ease forwards;
    width: 0;
  }
  @keyframes load { to { width: 100%; } }
</style>
</head>
<body>
<div id="app">
  <video id="webcam" playsinline autoplay muted></video>
  <canvas id="main-canvas"></canvas>

  <div id="scanlines"></div>
  <div id="vignette"></div>

  <div id="corner-tl"></div>
  <div id="corner-tr"></div>
  <div id="corner-bl"></div>
  <div id="corner-br"></div>

  <div id="hud">
    <div class="hud-title">
      <strong>CATS CRADLE</strong>
      NEON THREAD // v2.0
    </div>
    <div class="hud-right">
      <span id="status-dot"></span>TRACKING ACTIVE<br>
      <span id="hand-count">HANDS: 0</span><br>
      <span id="fps-display">FPS: --</span>
    </div>
  </div>

  <div id="loading-screen">
    <div class="loading-title">CATS CRADLE</div>
    <div class="loading-sub">INITIALIZING NEURAL HAND TRACKER</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
    <div class="loading-sub" id="load-msg">LOADING MEDIAPIPE...</div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const FINGERTIP_IDS  = [4, 8, 12, 16, 20];
const ALL_LANDMARK_IDS = Array.from({length: 21}, (_, i) => i);
const PALM_IDS = [0, 1, 5, 9, 13, 17];

// Color palette
const COLORS = {
  cyan:    [0,   255, 255],
  magenta: [255, 0,   255],
  yellow:  [255, 230, 0  ],
  green:   [0,   255, 128],
};

// ─── STATE ─────────────────────────────────────────────────────────────────
let hands_data = [];
let particles  = [];
let frameCount = 0;
let lastFpsTime = performance.now();
let fps = 60;
let W, H;

// ─── CANVAS SETUP ──────────────────────────────────────────────────────────
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── PARTICLE SYSTEM ───────────────────────────────────────────────────────
class Particle {
  constructor(x, y, colorA, colorB) {
    this.x  = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8;
    this.life = 1.0;
    this.decay = 0.025 + Math.random() * 0.04;
    this.size  = 2 + Math.random() * 5;
    // Pick a random color between two endpoint colors
    const t = Math.random();
    this.r = colorA[0] * (1-t) + colorB[0] * t;
    this.g = colorA[1] * (1-t) + colorB[1] * t;
    this.b = colorA[2] * (1-t) + colorB[2] * t;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.life -= this.decay;
    this.size *= 0.97;
  }
  draw(ctx) {
    ctx.save();
    const a = Math.max(0, this.life);
    ctx.globalAlpha = a;
    ctx.shadowBlur  = 12;
    ctx.shadowColor = `rgb(${this.r|0},${this.g|0},${this.b|0})`;
    ctx.fillStyle   = `rgb(${this.r|0},${this.g|0},${this.b|0})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnExplosion(x, y, colorA, colorB, count = 28) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, colorA, colorB));
  }
}

// ─── UTILS ─────────────────────────────────────────────────────────────────
function lerpColor(a, b, t) {
  return [
    a[0] + (b[0]-a[0])*t,
    a[1] + (b[1]-a[1])*t,
    a[2] + (b[2]-a[2])*t,
  ];
}
function toRgb(c, alpha=1) {
  return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${alpha})`;
}
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ─── SILHOUETTE HELPERS ────────────────────────────────────────────────────
// Draw a ghostly silhouette of the hand using landmark positions
function drawHandSilhouette(lm) {
  const CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17]
  ];
  ctx.save();
  ctx.strokeStyle = 'rgba(0,180,255,0.12)';
  ctx.lineWidth = 14;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 18;
  ctx.shadowColor = 'rgba(0,200,255,0.15)';
  for (const [a,b] of CONNECTIONS) {
    ctx.beginPath();
    ctx.moveTo(lm[a].x, lm[a].y);
    ctx.lineTo(lm[b].x, lm[b].y);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── STRING DRAWING ────────────────────────────────────────────────────────
let touchCooldown = {};

function drawStrings(leftTips, rightTips) {
  const maxDist = Math.hypot(W, H);

  for (let i = 0; i < leftTips.length; i++) {
    const L = leftTips[i];
    const R = rightTips[i];
    const d = dist(L, R);
    const t = Math.min(d / (maxDist * 0.6), 1); // 0 = close, 1 = far

    // Color gradient: cyan -> magenta -> yellow based on distance
    let col;
    if (t < 0.5) {
      col = lerpColor(COLORS.cyan, COLORS.magenta, t * 2);
    } else {
      col = lerpColor(COLORS.magenta, COLORS.yellow, (t - 0.5) * 2);
    }

    const thickness = 1.5 + (1 - t) * 3.5; // thicker when close
    const glow      = 8  + (1 - t) * 22;

    // Outer glow layer
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(L.x, L.y);

    // Elastic mid-point sag
    const sag = t * 0.12 * H;
    const mx  = (L.x + R.x) / 2;
    const my  = (L.y + R.y) / 2 + sag;
    ctx.quadraticCurveTo(mx, my, R.x, R.y);

    ctx.strokeStyle = toRgb(col, 0.25);
    ctx.lineWidth   = thickness + 8;
    ctx.shadowBlur  = glow * 2;
    ctx.shadowColor = toRgb(col, 0.5);
    ctx.lineCap = 'round';
    ctx.stroke();

    // Inner laser core
    ctx.beginPath();
    ctx.moveTo(L.x, L.y);
    ctx.quadraticCurveTo(mx, my, R.x, R.y);
    ctx.strokeStyle = toRgb(col, 0.9);
    ctx.lineWidth   = thickness;
    ctx.shadowBlur  = glow;
    ctx.shadowColor = toRgb(col, 1);
    ctx.stroke();
    ctx.restore();

    // ── Collision / touch detection ──────────────────────────────
    const key = `${i}`;
    if (d < 28) {
      if (!touchCooldown[key] || performance.now() - touchCooldown[key] > 400) {
        touchCooldown[key] = performance.now();
        spawnExplosion(
          (L.x + R.x)/2, (L.y + R.y)/2,
          COLORS.cyan, COLORS.magenta, 32
        );
      }
    }
  }
}

// ─── JOINT DOTS ────────────────────────────────────────────────────────────
function drawJoints(lm, isFingertip) {
  lm.forEach((pt, i) => {
    const tip  = FINGERTIP_IDS.includes(i);
    const size = tip ? 6 : 3;
    const col  = tip ? COLORS.cyan : COLORS.magenta;
    const glow = tip ? 18 : 8;

    ctx.save();
    ctx.shadowBlur  = glow;
    ctx.shadowColor = toRgb(col);
    ctx.fillStyle   = toRgb(col);
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, size, 0, Math.PI*2);
    ctx.fill();

    // White core
    ctx.shadowBlur = 0;
    ctx.fillStyle  = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, size * 0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ─── MAIN RENDER ───────────────────────────────────────────────────────────
function render() {
  requestAnimationFrame(render);
  frameCount++;

  // FPS counter
  const now = performance.now();
  if (now - lastFpsTime > 500) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fps-display').textContent = `FPS: ${fps}`;
  }

  // Deep midnight blue background + slight trail effect
  ctx.fillStyle = 'rgba(0, 4, 20, 0.82)';
  ctx.fillRect(0, 0, W, H);

  // Update & draw particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) { p.update(); p.draw(ctx); }

  if (!hands_data.length) return;

  // Gather hands by label
  let leftHand = null, rightHand = null;
  for (const h of hands_data) {
    if (h.label === 'Left')  leftHand  = h.landmarks;
    if (h.label === 'Right') rightHand = h.landmarks;
  }

  // Draw silhouettes
  if (leftHand)  drawHandSilhouette(leftHand);
  if (rightHand) drawHandSilhouette(rightHand);

  // Draw joints
  if (leftHand)  drawJoints(leftHand);
  if (rightHand) drawJoints(rightHand);

  // Draw strings between hands
  if (leftHand && rightHand) {
    const leftTips  = FINGERTIP_IDS.map(i => leftHand[i]);
    const rightTips = FINGERTIP_IDS.map(i => rightHand[i]);
    drawStrings(leftTips, rightTips);
  }

  // Update HUD
  document.getElementById('hand-count').textContent = `HANDS: ${hands_data.length}`;
}
render();

// ─── MEDIAPIPE INIT ────────────────────────────────────────────────────────
async function initMediaPipe() {
  const video  = document.getElementById('webcam');
  const loadEl = document.getElementById('load-msg');

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6,
  });

  hands.onResults(results => {
    hands_data = [];
    if (!results.multiHandLandmarks) return;

    results.multiHandLandmarks.forEach((lm, idx) => {
      const label = results.multiHandedness[idx].label; // 'Left' or 'Right'
      // Mirror x coordinate (video is mirrored)
      const mapped = lm.map(pt => ({
        x: (1 - pt.x) * W,
        y: pt.y * H,
        z: pt.z,
      }));
      hands_data.push({ label, landmarks: mapped });
    });
  });

  loadEl.textContent = 'REQUESTING CAMERA...';

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 1280, height: 720, facingMode: 'user' },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  video.play();

  loadEl.textContent = 'CALIBRATING...';

  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 1280,
    height: 720,
  });
  camera.start();

  // Hide loading screen
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hidden');
  }, 800);
}

// Boot
initMediaPipe().catch(err => {
  document.getElementById('load-msg').textContent = 'ERROR: ' + err.message;
  console.error(err);
});
</script>
</body>
</html>
